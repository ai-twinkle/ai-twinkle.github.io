name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: docker
    container:
      image: oven/bun:alpine
      volumes:
        - /web:/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        run: apk add --no-cache nodejs

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          NITRO_PRESET: node-server
          NODE_ENV: production

      - name: Deploy
        run: |
          rm -rf /web/twinkle_ai/.output
          cp -r .output /web/twinkle_ai/.output
          echo "✅ Deployed to /web/twinkle_ai/"
